<svg viewBox="0 0 1200 640" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3ED9C4"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#F0B93D"/>
    </marker>
  </defs>
  <rect width="1200" height="640" fill="#0A0D12"/>

  <text x="30" y="36" fill="#E7EAEE" font-size="18" font-weight="700">SentinelOps — Architecture Flow</text>
  <text x="30" y="56" fill="#7A8290" font-size="12">telemetry ingestion → ensemble anomaly detection → RAG-grounded remediation → human-in-the-loop escalation</text>

  <!-- Column 1: Data -->
  <g>
    <rect x="30" y="100" width="190" height="70" rx="8" fill="#12161D" stroke="#1F2530"/>
    <text x="50" y="128" fill="#3ED9C4" font-size="12" font-weight="600">data_gen.py</text>
    <text x="50" y="148" fill="#7A8290" font-size="10">Synthetic telemetry</text>
    <text x="50" y="162" fill="#7A8290" font-size="10">12,096 rows · 6 services</text>
  </g>

  <path d="M220,135 H270" stroke="#3ED9C4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="270" y="100" width="190" height="70" rx="8" fill="#12161D" stroke="#1F2530"/>
    <text x="290" y="128" fill="#3ED9C4" font-size="12" font-weight="600">features.py</text>
    <text x="290" y="148" fill="#7A8290" font-size="10">DuckDB rolling window</text>
    <text x="290" y="162" fill="#7A8290" font-size="10">19 engineered features</text>
  </g>

  <path d="M460,135 H510" stroke="#3ED9C4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="510" y="90" width="220" height="90" rx="8" fill="#12161D" stroke="#1F2530"/>
    <text x="530" y="115" fill="#3ED9C4" font-size="12" font-weight="600">train_models.py</text>
    <text x="530" y="134" fill="#7A8290" font-size="10">IsolationForest · OneClassSVM</text>
    <text x="530" y="148" fill="#7A8290" font-size="10">Autoencoder (Keras)</text>
    <text x="530" y="162" fill="#F0B93D" font-size="10">Ensemble: IF ∩ AE agreement</text>
  </g>

  <path d="M620,180 V210" stroke="#3ED9C4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="440" y="210" width="360" height="70" rx="8" fill="#12161D" stroke="#3ED9C4" stroke-opacity="0.4"/>
    <text x="460" y="238" fill="#3ED9C4" font-size="13" font-weight="700">FastAPI Service — /detect</text>
    <text x="460" y="258" fill="#7A8290" font-size="10">scores incoming telemetry batch, returns anomaly + votes</text>
  </g>

  <path d="M620,280 V320" stroke="#FF6B5B" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
  <text x="630" y="305" fill="#FF6B5B" font-size="10">anomaly found</text>

  <g>
    <rect x="440" y="320" width="360" height="70" rx="8" fill="#12161D" stroke="#FF6B5B" stroke-opacity="0.4"/>
    <text x="460" y="348" fill="#FF6B5B" font-size="13" font-weight="700">FastAPI Service — /remediate</text>
    <text x="460" y="368" fill="#7A8290" font-size="10">pgvector retrieval (LlamaIndex) → Groq grounded generation</text>
  </g>

  <path d="M620,390 V420" stroke="#3ED9C4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="440" y="420" width="360" height="60" rx="8" fill="#12161D" stroke="#1F2530"/>
    <text x="460" y="445" fill="#3ED9C4" font-size="12" font-weight="600">pgvector (Postgres)</text>
    <text x="460" y="462" fill="#7A8290" font-size="10">15–20 embedded SRE runbooks · sentence-transformers</text>
  </g>

  <!-- Right: n8n + escalation -->
  <path d="M800,235 H900" stroke="#3ED9C4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="900" y="90" width="250" height="90" rx="8" fill="#12161D" stroke="#1F2530"/>
    <text x="920" y="115" fill="#3ED9C4" font-size="12" font-weight="600">n8n — Webhook Trigger</text>
    <text x="920" y="134" fill="#7A8290" font-size="10">POST /webhook/sentinelops-alert</text>
    <text x="920" y="150" fill="#7A8290" font-size="10">→ HTTP Request node → /detect</text>
    <text x="920" y="166" fill="#7A8290" font-size="10">→ IF node: anomalies_found &gt; 0</text>
  </g>

  <path d="M800,355 H900" stroke="#FF6B5B" stroke-width="1.5" marker-end="url(#arrowAmber)"/>

  <g>
    <rect x="900" y="320" width="250" height="70" rx="8" fill="#12161D" stroke="#F0B93D" stroke-opacity="0.4"/>
    <text x="920" y="348" fill="#F0B93D" font-size="12" font-weight="600">Slack — #sentinelops-alerts</text>
    <text x="920" y="368" fill="#7A8290" font-size="10">Human-in-the-loop escalation</text>
  </g>

  <path d="M900,175 C960,220 960,300 950,320" stroke="#7A8290" stroke-width="1" stroke-dasharray="3 3" fill="none"/>

  <g>
    <rect x="900" y="420" width="250" height="60" rx="8" fill="#12161D" stroke="#1F2530"/>
    <text x="920" y="445" fill="#3ED9C4" font-size="12" font-weight="600">Respond to Webhook</text>
    <text x="920" y="462" fill="#7A8290" font-size="10">Sync response back to caller</text>
  </g>
  <path d="M1025,390 V420" stroke="#3ED9C4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <g transform="translate(30,540)">
    <rect width="1140" height="70" rx="8" fill="#12161D" stroke="#1F2530"/>
    <circle cx="24" cy="24" r="4" fill="#3ED9C4"/>
    <text x="36" y="29" fill="#7A8290" font-size="11">data / detection pipeline</text>
    <circle cx="240" cy="24" r="4" fill="#FF6B5B"/>
    <text x="252" y="29" fill="#7A8290" font-size="11">anomaly-triggered path</text>
    <circle cx="440" cy="24" r="4" fill="#F0B93D"/>
    <text x="452" y="29" fill="#7A8290" font-size="11">human escalation</text>
    <text x="24" y="52" fill="#7A8290" font-size="10">Read-only diagnostics returned by default · destructive commands gated behind "REQUIRES HUMAN APPROVAL"</text>
  </g>
</svg>
