services:
  postgres:
    image: postgres:15-alpine
    container_name: promptshield-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_secure_password
      POSTGRES_DB: promptshield
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:latest
    container_name: promptshield-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: your_secure_password
    volumes:
      - mongodb_data:/data/db

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: promptshield-n8n
    ports:
      - "5666:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
      - mongodb

volumes:
  postgres_data:
  mongodb_data:
  n8n_data:
