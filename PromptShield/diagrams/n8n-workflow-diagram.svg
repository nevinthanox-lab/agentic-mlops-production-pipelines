<svg viewBox="0 0 1400 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5f6368"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f9d58"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="620" fill="#ffffff"/>

  <text x="700" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a">PromptShield — n8n Workflow: "Ingress to Escalation"</text>
  <text x="700" y="54" text-anchor="middle" font-size="12.5" fill="#6b6b6b">7-node workflow · last verified run succeeded in 2m 14.6s</text>

  <!-- lane background -->
  <rect x="20" y="90" width="1360" height="330" rx="14" fill="#fafafa" stroke="#eeeeee"/>

  <!-- Node 1: Webhook -->
  <circle cx="110" cy="255" r="34" fill="#FDE9D9" stroke="#E8710A" stroke-width="1.5"/>
  <text x="110" y="250" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1a1a1a">POST</text>
  <text x="110" y="264" text-anchor="middle" font-size="9.5" fill="#1a1a1a">Webhook</text>
  <text x="110" y="308" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a1a">1. Webhook</text>
  <text x="110" y="322" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a1a">Prompt Ingress</text>

  <line x1="144" y1="255" x2="216" y2="255" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="180" y="245" text-anchor="middle" font-size="9" fill="#5f6368">1 item</text>

  <!-- Node 2: HTTP Classify -->
  <circle cx="250" cy="255" r="34" fill="#E8F0FE" stroke="#4285F4" stroke-width="1.5"/>
  <text x="250" y="259" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1a4fb8">HTTP</text>
  <text x="250" y="308" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a1a">2. HTTP Request</text>
  <text x="250" y="322" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a1a">Classify</text>
  <text x="250" y="336" text-anchor="middle" font-size="9.5" fill="#777">POST host.docker.inte…</text>

  <line x1="284" y1="255" x2="356" y2="255" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="320" y="245" text-anchor="middle" font-size="9" fill="#5f6368">1 item</text>

  <!-- Node 3: IF quarantine -->
  <circle cx="390" cy="255" r="34" fill="#E6F4EA" stroke="#0f9d58" stroke-width="1.5"/>
  <text x="390" y="259" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0b7a43">IF</text>
  <text x="390" y="308" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a1a">3. IF — Quarantine</text>
  <text x="390" y="322" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a1a">Triggered</text>

  <line x1="424" y1="255" x2="496" y2="255" stroke="#0f9d58" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="460" y="245" text-anchor="middle" font-size="9" fill="#0f9d58">true</text>

  <!-- Node 4: Wait -->
  <circle cx="530" cy="255" r="34" fill="#FCE8E6" stroke="#c0392b" stroke-width="1.5"/>
  <text x="530" y="259" text-anchor="middle" font-size="10.5" font-weight="700" fill="#96281c">WAIT</text>
  <text x="530" y="308" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a1a">4. Wait — Pipeline</text>
  <text x="530" y="322" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a1a">Completion</text>

  <line x1="564" y1="255" x2="636" y2="255" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="600" y="245" text-anchor="middle" font-size="9" fill="#5f6368">1 item</text>

  <!-- Node 5: HTTP Request (highlighted, NOT mongo) -->
  <circle cx="670" cy="255" r="38" fill="#E8F0FE" stroke="#4285F4" stroke-width="2.5"/>
  <text x="670" y="259" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1a4fb8">HTTP</text>
  <text x="670" y="312" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a1a">5. HTTP Request</text>
  <text x="670" y="326" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="700">(fetch trace status)</text>

  <line x1="708" y1="255" x2="780" y2="255" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="744" y="245" text-anchor="middle" font-size="9" fill="#5f6368">1 item</text>

  <!-- Node 6: IF Escalation Fired -->
  <circle cx="814" cy="255" r="34" fill="#E6F4EA" stroke="#0f9d58" stroke-width="1.5"/>
  <text x="814" y="259" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0b7a43">IF</text>
  <text x="814" y="308" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a1a">6. IF — Escalation</text>
  <text x="814" y="322" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a1a">Fired</text>

  <line x1="848" y1="255" x2="920" y2="255" stroke="#0f9d58" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="884" y="245" text-anchor="middle" font-size="9" fill="#0f9d58">true</text>

  <!-- Node 7: Slack -->
  <circle cx="954" cy="255" r="34" fill="#F3E5F5" stroke="#4A154B" stroke-width="1.5"/>
  <text x="954" y="259" text-anchor="middle" font-size="10.5" font-weight="700" fill="#4A154B">HTTP</text>
  <text x="954" y="308" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a1a">7. HTTP Request</text>
  <text x="954" y="322" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a1a">Slack Webhook</text>
  <text x="954" y="336" text-anchor="middle" font-size="9.5" fill="#777">POST hooks.slack.co…</text>

  <!-- false branches (short, muted) -->
  <line x1="390" y1="289" x2="390" y2="380" stroke="#c8c8c8" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="392" y="400" font-size="9.5" fill="#9aa0a6">false → end (no quarantine needed)</text>

  <line x1="814" y1="289" x2="814" y2="380" stroke="#c8c8c8" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="816" y="400" font-size="9.5" fill="#9aa0a6">false → end (no escalation raised)</text>

  <!-- callout box for node 5 -->
  <path d="M670 293 C 670 440, 670 440, 670 440" fill="none" stroke="none"/>
  <line x1="670" y1="325" x2="670" y2="440" stroke="#c0392b" stroke-width="1.3" stroke-dasharray="3 3"/>
  <rect x="470" y="440" width="400" height="118" rx="10" fill="#FCE8E6" stroke="#c0392b" stroke-width="1.5"/>
  <text x="490" y="464" font-size="12" font-weight="700" fill="#8B1E12">⚠ Design note — Node 5</text>
  <text x="490" y="484" font-size="11" fill="#3d3d3d">Node 5 is a plain <tspan font-weight="700">HTTP Request</tspan> node, not a native</text>
  <text x="490" y="500" font-size="11" fill="#3d3d3d">MongoDB node. It polls the FastAPI service for the</text>
  <text x="490" y="516" font-size="11" fill="#3d3d3d">pipeline_traces result instead of querying Mongo</text>
  <text x="490" y="532" font-size="11" fill="#3d3d3d">directly — FastAPI stays the single writer to both</text>
  <text x="490" y="548" font-size="11" fill="#3d3d3d">MongoDB and Postgres, avoiding dual-write races.</text>

  <text x="700" y="596" text-anchor="middle" font-size="10.5" fill="#9aa0a6">Exported as: "PromptShield - Ingress to Escalation.json" · imported via n8n → Import from File</text>
</svg>
